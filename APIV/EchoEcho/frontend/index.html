<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EchoEcho</title>
    <link rel="icon" href="./favicon.ico" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="intro">
        <p class="kicker">AI songwriting notebook</p>
        <h1>EchoEcho</h1>
        <p>Transform emotions into musical inspiration.</p>
      </section>

      <section class="workspace">
        <form id="generator-form" class="panel form-panel">
          <div class="field-grid">
            <label>
              <span>Mood</span>
              <select name="mood">
                <option>Romantic</option>
                <option>Sad</option>
                <option>Happy</option>
                <option>Dreamy</option>
                <option>Nostalgic</option>
                <option>Calm</option>
                <option>Energetic</option>
              </select>
            </label>

            <label>
              <span>Theme</span>
              <select name="theme">
                <option>Love</option>
                <option>Memories</option>
                <option>Rain</option>
                <option>Heartbreak</option>
                <option>Night</option>
                <option>Summer</option>
                <option>Travel</option>
                <option>Hope</option>
              </select>
            </label>

            <label>
              <span>Style</span>
              <select name="style">
                <option>Lo-fi</option>
                <option>Acoustic</option>
                <option>Pop</option>
                <option>Piano</option>
                <option>Ambient</option>
                <option>Cinematic</option>
                <option>Jazz</option>
              </select>
            </label>
          </div>

          <fieldset>
            <legend>Instruments</legend>
            <div class="checks">
              <label><input type="checkbox" name="instruments" value="Piano" checked /> Piano</label>
              <label><input type="checkbox" name="instruments" value="Flute" /> Flute</label>
              <label><input type="checkbox" name="instruments" value="Guitar" /> Guitar</label>
              <label><input type="checkbox" name="instruments" value="Violin" /> Violin</label>
              <label><input type="checkbox" name="instruments" value="Strings" /> Strings</label>
              <label><input type="checkbox" name="instruments" value="Synth" /> Synth</label>
            </div>
          </fieldset>

          <div class="slider-grid">
            <label>
              <span>Energy <strong id="energy-value">4</strong></span>
              <input id="energy" name="energy" type="range" min="1" max="10" value="4" />
            </label>
            <label>
              <span>Tempo <strong id="tempo-value">100 BPM</strong></span>
              <input id="tempo" name="tempo" type="range" min="60" max="160" value="100" />
            </label>
          </div>

          <button id="generate-button" type="submit">Generate Inspiration</button>
        </form>

        <aside class="panel progress-panel">
          <div class="progress-top">
            <span id="progress-label">Ready</span>
            <strong id="progress-percent">0%</strong>
          </div>
          <div class="progress-track">
            <div id="progress-fill"></div>
          </div>
          <div class="time-row">
            <span>Elapsed <strong id="elapsed-time">0s</strong></span>
            <span>Remaining <strong id="remaining-time">0s</strong></span>
          </div>
          <p id="error-message" class="error" role="alert"></p>
          <div id="result"></div>
        </aside>
      </section>

      <section class="library-section">
        <div class="section-heading">
          <div>
            <p class="kicker">Library</p>
            <h2>Saved Inspirations</h2>
          </div>
          <button id="refresh-history" type="button">Refresh</button>
        </div>
        <div id="library" class="library"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
